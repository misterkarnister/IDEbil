<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDEbil</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0E0024;
            color: #F1A5F2;
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* Layout Structure */
        #app-container {
            display: flex;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
.codeblocks-user-keyword {
    color: #F1A5F2 !important;
    font-weight: bold !important;
}
/* Styl dla żółtej strzałki aktualnej linii debuggera */
.monaco-debug-line-glyph {
    background: #ffcc00;
    /* Tworzymy zgrabną strzałkę w prawo za pomocą clip-path */
    clip-path: polygon(0% 20%, 60% 20%, 60% 0%, 100% 50%, 60% 100%, 60% 80%, 0% 80%);
    width: 12px !important;
    height: 12px !important;
    margin-left: auto;
    margin-right: auto;
    margin-top: 2px;
}

/* Opcjonalnie: Delikatne podświetlenie tła całej aktualnej linii */
.monaco-debug-line-background {
    background-color: rgba(255, 204, 0, 0.1);
}

/* Styl dla czerwonej kropki breakpointa w marginesie */
.monaco-breakpoint-glyph {
    background: #e51400;
    border-radius: 50%;
    width: 10px !important;
    height: 10px !important;
    margin-left: auto;
    margin-right: auto;
    margin-top: 3px;
    cursor: pointer;
}
	.active-tree-item {
    	background-color: #37373d !important; /* Ładny niebieski kolor zaznaczenia z VS Code */
    	color: #ffffff !important;
}
        #file-explorer {
            width: 220px;
            background-color: #0E0024;
            border-right: 2px solid #3c3c3c;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
	/* Styl dla kontenera elementu drzewka plików, aby ikona kosza była po prawej */
.tree-item-container {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 8px;
}

/* Ukrywamy ikonę kosza domyślnie, pokazujemy tylko w aktywnym (zaznaczonym) elemencie */
.tree-delete-btn {
    display: none;
    color: #0E0024;
    cursor: pointer;
    font-weight: bold;
    padding: 0 4px;
}

.active-tree-item .tree-delete-btn {
    display: inline-block;
}

.tree-delete-btn:hover {
    color: #ff3333;
    background-color: rgba(255,255,255,0.1);
    border-radius: 3px;
}
        #editor-container {
            flex: 1;
	    position:relative;
        }

        #ai-sidebar {
            width: 350px;
            background-color: #0E0024;
            border-left: 2px solid #3c3c3c;
            display: flex;
            flex-direction: column;
            padding: 15px;
            box-sizing: border-box;
            flex-shrink: 0;
        }

        /* Sidebar Elements */
        h3 { margin-top: 0; color: #007acc; font-family: sans-serif; }
        
        #chat-output {
            flex: 1;
            background-color: #130030;
            border: 1px solid #3c3c3c;
            padding: 10px;
            border-radius: 4px;
            overflow-y: auto;
            margin-bottom: 10px;
            font-size: 14px;
        }

        #chat-input {
            background-color: #130030;
            border: 1px solid #6b6b6b;
            color: #F1A5F2;
            padding: 10px;
            border-radius: 4px;
            resize: none;
        }

        #action-btn {
            background-color: #130030;
            color:#F1A5F2;
            border: 1px solid #3c3c3c;
            padding: 10px;
            margin-top: 8px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
        }
	#file-tree:focus {
    outline: 1px solid #007acc;
    background-color: #0E0024;
}
        #action-btn:hover { background-color: #8080FF; }
	#tabs-container {
            display: none !important; /* <-- NOWOŚĆ: Ukrywa górny pasek plików */
            display: flex;
            background-color: #252526;
            overflow-x: auto;
            border-bottom: 1px solid #3c3c3c;
            height: 35px;
            box-sizing: border-box;
        }
        #explorer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            font-size: 11px;
            font-weight: bold;
            color:#F1A5F2;
            letter-spacing: 1px;
            border-bottom: 1px solid #3c3c3c;
        }

        #explorer-add-btn {
            background: none;
            border: none;
            color:#F1A5F2;
            font-size: 16px;
            cursor: pointer;
        }
        #explorer-add-btn:hover { color: white; }

        #file-tree {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        .tree-item {
            font-size: 13px;
            color:#F1A5F2;
            cursor: pointer;
            transition: background-color 0.15s ease;
        }
        .tree-item:hover {
            background-color:#130030;
            color:#F1A5F2;
        }
        .tree-item.active {
            background-color: #37373d;
            color:#F1A5F2;
            font-weight: 500;
        }

        /* Sleek scrollbar styling for the terminal log panel window */
        #terminal-output::-webkit-scrollbar {
            width: 8px;
        }
        #terminal-output::-webkit-scrollbar-track {
            background: #0E0024;
        }
        #terminal-output::-webkit-scrollbar-thumb {
            background: #0E0024;
            border-radius: 4px;
        }
        #terminal-output::-webkit-scrollbar-thumb:hover {
            background: #0E0024;
        }
    </style>
</head>
<body>

<div id="welcome-modal" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(30,30,30,0.9); z-index: 9999; display: flex; justify-content: center; align-items: center;">
    <div style="background: #0E0024; padding: 30px; border-radius: 8px; border: 1px solid #3c3c3c; width: 400px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.5);">
        <h2 style="color: #007acc; margin-top: 0; font-family: sans-serif;">IDEbil</h2>
	<p style="color: #F1A5F2; font-size: 14px; margin-bottom: 25px;">Enter project name to open or create a new workspace configuration:</p>
   	<input type="text" id="modal-project-input" placeholder="e.g. my_project" style="padding: 8px; width: 100%; box-sizing: border-box; margin-bottom: 15px; background: #130030; color: #F1A5F2; border: 1px solid #555; border-radius: 4px;">
        
        <button id="modal-submit-btn" style="width: 100%; padding: 10px; background: #130030; color: #F1A5F2; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">
            Go to Project
        </button>     
    </div>
</div>

<div id="app-container">
    <div id="file-explorer">
        <div id="explorer-header">
            <span>WORKSPACE</span>
            <button id="explorer-add-btn" title="New File">+</button>
        </div>
        <div id="file-tree"></div>
    </div>

    <div style="flex: 1; display: flex; flex-direction: column; height: 100%; overflow: hidden; box-sizing: border-box;">
        <div style="background-color: #0E0024; display: flex; height: 35px; align-items: center; border-bottom: 1px solid #252526; flex-shrink: 0; box-sizing: border-box;">
            <div id="tabs-container" style="display: flex; overflow-x: auto; height: 100%;"></div>
        </div>
        
        <div style="display: flex; flex-direction: column; flex-grow: 1; height: calc(100% - 35px); overflow: hidden; box-sizing: border-box;">
            <div id="editor-container"></div>
            
            <div id="terminal-panel" style="height: 35%; max-height: 35%; background-color: #0E0024; border-top: 2px solid #252526; display: flex; flex-direction: column; font-family: 'Courier New', Courier, monospace; overflow: hidden; box-sizing: border-box; flex-shrink: 0;">
                <div style="background-color:#130030 ; padding: 5px 15px; font-size: 11px; color: #F1A5F2; display: flex; justify-content: space-between; font-family: sans-serif; flex-shrink: 0; height: 24px; align-items: center; box-sizing: border-box;">
                    <span>INTEGRATED TERMINAL</span>
                    <span style="color: #C061CB;">bash / cmd</span>
                </div>
                
                <div id="terminal-output" style="height: calc(100% - 56px); max-height: calc(100% - 56px); flex-grow: 1; padding: 10px; color:#F1A5F2; font-size: 13px; overflow-y: scroll; overflow-x: hidden; white-space: pre-wrap; background-color: #0E0024; box-sizing: border-box;">Welcome to your integrated workspace terminal</div>
                
                <div style="display: flex; background-color:#130030; border-top: 1px solid #252526; align-items: center; padding: 4px 10px; flex-shrink: 0; height: 32px; box-sizing: border-box;">
                    <span style="color: #73c991; font-weight: bold; margin-right: 8px;">$</span>
                    <input type="text" id="terminal-input" placeholder="Run terminal command..." style="flex-grow: 1; background: transparent; border: none; color:#F1A5F2; font-family: inherit; font-size: 13px; outline: none;" />
                </div>
            </div>
        </div>
    </div>

    <div id="ai-sidebar">
        <h3>AI Copilot</h3>
        <div id="chat-output">AI outputs will appear here...</div>
        <textarea id="chat-input" rows="3" placeholder="Ask AI about your code..."></textarea>
        <button id="action-btn">Analyze Code</button>
    </div>

    <div id="debug-sidebar" style="display: none; width: 350px; background-color:#0E0024; border-left: 1px solid #2d2d2d; flex-direction: column; height: 100vh; box-sizing: border-box; z-index: 10;">
       <div id="watches-panel" tabindex="-1" style="flex: 1; display: flex; flex-direction: column; border-bottom: 1px solid #2d2d2d; padding: 15px; overflow-y: auto;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h3 style="margin: 0; color: #569cd6; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px;">👀 Watches</h3>
                <button id="add-watch-btn" style="background: none; border: none; color: #F1A5F2; cursor: pointer; font-size: 16px; padding: 0 5px; line-height: 1;" title="Add variable to watch (Alt+W)">+</button>
            </div>
            <div id="watches-list" style="font-family: 'Courier New', Courier, monospace; font-size: 12px; color: #cccccc; display: flex; flex-direction: column; gap: 4px;">
                <span style="color: #6a9955; font-style: italic;">No active watches. Click + to add.</span>
            </div>
        </div>
        
        <div id="callstack-panel" tabindex="-1" style="flex: 1; display: flex; flex-direction: column; padding: 15px; overflow-y: auto;">
            <h3 style="margin-top: 0; margin-bottom: 10px; color: #569cd6; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px;">🥞 Call Stack</h3>
            <div id="callstack-list" style="font-family: 'Courier New', Courier, monospace; font-size: 12px; color: #cccccc;">
                <span style="color: #6a9955; font-style: italic;">No active frames.</span>
            </div>
        </div>
    </div>

</div> 
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
